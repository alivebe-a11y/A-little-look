services:
  web:
    image: ghcr.io/alivebe-a11y/a-little-look:latest
    pull_policy: always
    container_name: polymarket-edge-web
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      POLYMARKET_EDGE_DATA: /app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 30s
      timeout: 3s
      retries: 3

  # One-shot helper: `docker compose run --rm ingest`
  ingest:
    image: ghcr.io/alivebe-a11y/a-little-look:latest
    pull_policy: always
    profiles: ["jobs"]
    depends_on:
      - web
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      POLYMARKET_EDGE_DATA: /app/data
    entrypoint: ["polymarket-edge"]
    command: ["ingest", "--since", "2024-01-01"]
